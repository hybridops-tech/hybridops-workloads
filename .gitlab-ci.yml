stages:
  - validate

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

default:
  image: alpine:3.20
  interruptible: true
  before_script:
    - apk add --no-cache bash coreutils diffutils findutils grep ripgrep

validate:onprem-learn-stage1:
  stage: validate
  script:
    - ./scripts/validate.sh --strict --target onprem-learn-stage1

validate:onprem-ci-stage1:
  stage: validate
  script:
    - ./scripts/validate.sh --strict --target onprem-ci-stage1
