apiVersion: apps/v1
kind: Deployment
metadata:
  name: academy-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: academy-website
  template:
    metadata:
      labels:
        app.kubernetes.io/name: academy-website
    spec:
      initContainers:
        - name: unpack-runtime
          image: node:22-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              mkdir -p /app
              tar -xzf /runtime/dist.tgz -C /app
              cd /app
              npm ci --omit=dev --no-audit --no-fund
          volumeMounts:
            - name: app-data
              mountPath: /app
            - name: runtime-payload
              mountPath: /runtime
              readOnly: true
      containers:
        - name: web
          image: node:22-slim
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/dist/server/entry.mjs
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: academy-website-env
            - secretRef:
                name: academy-website-secrets
          readinessProbe:
            httpGet:
              path: /learn/login
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: app-data
              mountPath: /app
      volumes:
        - name: app-data
          emptyDir: {}
        - name: runtime-payload
          secret:
            secretName: academy-website-runtime
