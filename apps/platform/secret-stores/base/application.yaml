apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-secret-stores
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    hyops.domain: platform
    hyops.app: secret-stores
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  source:
    repoURL: https://github.com/hybridops-tech/hybridops-workloads.git
    targetRevision: main
    path: apps/platform/secret-stores/manifests/base
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
