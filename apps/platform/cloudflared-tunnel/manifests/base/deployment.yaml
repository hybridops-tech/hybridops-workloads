apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-cloudflared-tunnel
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-cloudflared-tunnel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-cloudflared-tunnel
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-cloudflared-tunnel-secrets
                  key: TUNNEL_TOKEN
          command:
            - cloudflared
            - tunnel
            - --no-autoupdate
            - --loglevel
            - info
            - --metrics
            - 0.0.0.0:2000
            - run
          ports:
            - name: metrics
              containerPort: 2000
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
