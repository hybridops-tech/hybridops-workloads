apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          imagePullPolicy: IfNotPresent
          args:
            - start
            - --import-realm
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: platform-keycloak-env
            - secretRef:
                name: platform-keycloak-secrets
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: realm-import
          configMap:
            name: platform-keycloak-realm
