apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-keycloak
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-keycloak
    spec:
      initContainers:
        - name: prepare-providers
          image: curlimages/curl:8.13.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              mkdir -p /providers
              curl -fsSL "${KEYCLOAK_EVENTS_EXTENSION_JAR_URL}" -o /providers/keycloak-events.jar
              if [ -f /theme/hybridops-theme.jar ]; then
                cp /theme/hybridops-theme.jar /providers/hybridops-theme.jar
              fi
          envFrom:
            - configMapRef:
                name: platform-keycloak-env
          volumeMounts:
            - name: providers
              mountPath: /providers
            - name: keycloak-theme
              mountPath: /theme
              readOnly: true
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              cp /providers/*.jar /opt/keycloak/providers/ 2>/dev/null || true
              exec /opt/keycloak/bin/kc.sh start
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: platform-keycloak-env
            - secretRef:
                name: platform-keycloak-secrets
          volumeMounts:
            - name: providers
              mountPath: /providers
              readOnly: true
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: providers
          emptyDir: {}
        - name: keycloak-theme
          secret:
            secretName: platform-keycloak-theme
            optional: true
