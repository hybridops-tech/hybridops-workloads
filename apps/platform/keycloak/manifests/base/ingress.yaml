apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-keycloak
spec:
  ingressClassName: nginx
  rules:
    - host: auth.example.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-keycloak
                port:
                  number: 80
