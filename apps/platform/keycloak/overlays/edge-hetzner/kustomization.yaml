apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: Application
      name: platform-keycloak
    patch: |-
      - op: replace
        path: /spec/source/path
        value: apps/platform/keycloak/manifests/overlays/edge-hetzner
