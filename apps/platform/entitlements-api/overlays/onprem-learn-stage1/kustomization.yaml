apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: Application
      name: platform-entitlements-api
    patch: |-
      - op: replace
        path: /spec/source/path
        value: apps/platform/entitlements-api/manifests/overlays/onprem
