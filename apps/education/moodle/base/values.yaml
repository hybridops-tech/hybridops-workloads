global:
  imagePullSecrets: []
  security:
    allowInsecureImages: true

# Bitnami Moodle chart values
#
# Chosen chart:
# - repo: https://charts.bitnami.com/bitnami
# - chart: moodle
# - version: 28.0.0
#
# Chosen runtime model:
# - external PostgreSQL (pgsql)
# - pre-baked custom Moodle image with auth_oidc included
# - single replica first
# - cluster ingress + TLS
# - pre-provisioned data claim until the object-storage-backed moodledata path is implemented cleanly

fullnameOverride: education-moodle

hyops:
  secretStoreName: gcp-secret-manager
  moodle:
    secretName: education-moodle-secrets
    secretRefreshInterval: 5m
    gsmKeys:
      adminPassword: REPLACE_GSM_SECRET_MOODLE_ADMIN_PASSWORD
      dbPassword: REPLACE_GSM_SECRET_MOODLE_DB_PASSWORD
      oidcClientSecret: REPLACE_GSM_SECRET_KEYCLOAK_MOODLE_CLIENT_SECRET
      smtpPassword: ""

image:
  registry: REPLACE_IMAGE_REGISTRY
  repository: REPLACE_PREBAKED_MOODLE_IMAGE_REPOSITORY
  tag: REPLACE_PREBAKED_MOODLE_IMAGE_TAG
  pullPolicy: IfNotPresent

replicaCount: 1

updateStrategy:
  type: Recreate

allowEmptyPassword: false
usePasswordFiles: true
moodleSkipInstall: false
moodleSiteName: HybridOps Academy
moodleUsername: admin
moodleEmail: academy@example.invalid
existingSecret: education-moodle-secrets

service:
  type: ClusterIP

ingress:
  enabled: true
  hostname: learn-lms.example.invalid
  path: /
  pathType: ImplementationSpecific
  tls: true
  ingressClassName: ""

mariadb:
  enabled: false

externalDatabase:
  type: pgsql
  host: REPLACE_EXT_POSTGRES_RW_HOST
  port: 5432
  user: moodle
  database: moodle
  existingSecret: education-moodle-secrets

volumePermissions:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/os-shell
    tag: 12-debian-12-r50
    pullPolicy: IfNotPresent
    pullSecrets: []

persistence:
  enabled: true
  existingClaim: REPLACE_MOODLE_DATA_CLAIM

metrics:
  enabled: false

extraEnvVars:
  - name: MOODLE_HOST
    value: learn-lms.example.invalid

extraDeploy:
  - |
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: {{ .Values.hyops.moodle.secretName }}
      namespace: {{ .Release.Namespace }}
    spec:
      refreshPolicy: Periodic
      refreshInterval: {{ .Values.hyops.moodle.secretRefreshInterval | quote }}
      secretStoreRef:
        name: {{ .Values.hyops.secretStoreName }}
        kind: ClusterSecretStore
      target:
        name: {{ .Values.hyops.moodle.secretName }}
        creationPolicy: Owner
      data:
        - secretKey: moodle-password
          remoteRef:
            key: {{ .Values.hyops.moodle.gsmKeys.adminPassword | quote }}
        - secretKey: mariadb-password
          remoteRef:
            key: {{ .Values.hyops.moodle.gsmKeys.dbPassword | quote }}
        - secretKey: oidc-client-secret
          remoteRef:
            key: {{ .Values.hyops.moodle.gsmKeys.oidcClientSecret | quote }}
        {{- if .Values.hyops.moodle.gsmKeys.smtpPassword }}
        - secretKey: smtp-password
          remoteRef:
            key: {{ .Values.hyops.moodle.gsmKeys.smtpPassword | quote }}
        {{- end }}

# Secret contract
# - Use one Kubernetes secret only: `education-moodle-secrets`
# - Required chart keys inside that secret:
#   - `moodle-password`
#   - `mariadb-password`
# - Optional chart key:
#   - `smtp-password`
# - Optional extra key for later OIDC/plugin wiring:
#   - `oidc-client-secret`
#
# Runtime-vault contract
# - Do not hand-author these values in Git.
# - Generate/persist them with `hyops secrets ...` under env-style keys:
#   - `MOODLE_ADMIN_PASSWORD`
#   - `MOODLE_DB_PASSWORD`
#   - `KEYCLOAK_MOODLE_CLIENT_SECRET`
#   - optional `MOODLE_SMTP_PASSWORD`
#
# Anti-drift
# - Bitnami chart image verification must be relaxed because the chosen path uses a custom pre-baked image.
# - If the published image is private, declare `global.imagePullSecrets` or `image.pullSecrets` explicitly.
# - The current chart line still references a removed `bitnami/os-shell` init image tag. Pin `volumePermissions.image`
#   to `bitnamilegacy/os-shell:12-debian-12-r50` until the chart line moves forward.
# - `mariadb-password` is the Bitnami chart key name even when `externalDatabase.type=pgsql`.
# - The single-secret model is intentional: admin, SMTP, and external DB password must not drift into separate
#   handwritten Kubernetes secrets.
# - The workload consumes the single secret name `education-moodle-secrets`, but that secret should be created by
#   ESO from the external secret backend rather than by a hand-authored Secret manifest.
# - `persistence.existingClaim` is the current chart bridge for Moodle file state.
# - Do not treat the claim-backed data path as the final object-storage solution.
