# Base values contract (Stage 2)
#
# This file defines the HybridOps runtime contract for Moodle.
# Map these keys into the chosen Helm chart values rather than treating this file
# as chart-native input. The chart itself may change; the contract below should not.
hyops:
  profile: base

  ingress:
    required: true
    host: learn-lms.example.invalid
    tlsSecretName: REPLACE_TLS_SECRET_NAME

  externalState:
    postgres:
      required: true
      host: REPLACE_EXT_POSTGRES_RW_HOST
      port: 5432
      database: moodle
      sslMode: require
      credentialsSecretRef:
        name: moodle-postgres
    postgresDrReplica:
      host: REPLACE_EXT_POSTGRES_RO_DR_HOST
      port: 5432
      sslMode: require
    objectStorage:
      required: true
      provider: REPLACE_AZURE_BLOB_OR_GCS
      bucket: REPLACE_MOODLEDATA_BUCKET
      endpoint: REPLACE_IF_NON_DEFAULT
      credentialsSecretRef:
        name: moodle-object-storage

  sso:
    required: true
    provider: keycloak
    moodlePlugin: auth_oidc
    issuerUrl: https://auth.example.invalid/realms/hybridops
    displayName: HybridOps SSO
    loginFlow: authorization_request
    pluginProvisioning:
      required: true
      mode: REPLACE_PREBAKED_IMAGE_OR_PLUGIN_FETCH
    client:
      id: hyops-moodle
      secretRef:
        name: moodle-sso
        key: client-secret
      redirectUri: https://learn-lms.example.invalid/admin/oauth2callback.php
    userMapping:
      email: email
      firstname: given_name
      lastname: family_name
      stableSubjectClaim: sub
      stableSubjectTargetField: idnumber

  accessSync:
    required: true
    source: entitlements-api
    apiUrl: http://platform-entitlements-api.entitlements.svc.cluster.local:8080
    tokenSecretRef:
      name: moodle-entitlements
      key: api-token
    mode: enrollment-sync
    syncOnLogin: true
    reconcileCron: true
    academyAllKey: academy_all
    academyTrackPrefix: academy_track:
    courseShortnames:
      networking-foundations: networking-foundations
      contract-driven-automation: contract-driven-automation
      verification-driven-operations: verification-driven-operations
      platform-services: platform-services
      ipam-driven-infrastructure: ipam-driven-infrastructure
      disaster-recovery-automation: disaster-recovery-automation

# Anti-drift
# - Moodle production state must be externalized: PostgreSQL + object storage for moodledata.
# - Do not reuse the Learn OIDC client for Moodle; use a dedicated confidential client.
# - Do not let generic authentication imply course access; access must come from explicit Academy entitlements.
# - Treat accessSync as a required integration contract; the reconciler implementation is not shipped yet in this repo.
