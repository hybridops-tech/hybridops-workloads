global:
  security:
    allowInsecureImages: true

# Bitnami Moodle chart values
#
# Chosen chart:
# - repo: https://charts.bitnami.com/bitnami
# - chart: moodle
# - version: 28.0.0
#
# Chosen runtime model:
# - external PostgreSQL (pgsql)
# - pre-baked custom Moodle image with auth_oidc included
# - single replica first
# - cluster ingress + TLS
# - pre-provisioned data claim until the object-storage-backed moodledata path is implemented cleanly

fullnameOverride: education-moodle

image:
  registry: REPLACE_IMAGE_REGISTRY
  repository: REPLACE_PREBAKED_MOODLE_IMAGE_REPOSITORY
  tag: REPLACE_PREBAKED_MOODLE_IMAGE_TAG
  pullPolicy: IfNotPresent

replicaCount: 1

updateStrategy:
  type: Recreate

allowEmptyPassword: false
usePasswordFiles: true
moodleSkipInstall: false
moodleSiteName: HybridOps Academy
moodleUsername: admin
moodleEmail: academy@example.invalid
existingSecret: moodle-admin

service:
  type: ClusterIP

ingress:
  enabled: true
  hostname: learn-lms.example.invalid
  path: /
  pathType: ImplementationSpecific
  tls: true
  ingressClassName: ""

mariadb:
  enabled: false

externalDatabase:
  type: pgsql
  host: REPLACE_EXT_POSTGRES_RW_HOST
  port: 5432
  user: moodle
  database: moodle
  existingSecret: moodle-externaldb

volumePermissions:
  enabled: true

persistence:
  enabled: true
  existingClaim: REPLACE_MOODLE_DATA_CLAIM

metrics:
  enabled: false

extraEnvVars:
  - name: MOODLE_HOST
    value: https://learn-lms.example.invalid

# Secret contract
# - `moodle-admin` must contain:
#   - `moodle-password`
#   - optional `smtp-password`
# - `moodle-externaldb` must contain:
#   - `mariadb-password`
#
# Anti-drift
# - Bitnami chart image verification must be relaxed because the chosen path uses a custom pre-baked image.
# - `mariadb-password` is the Bitnami chart key name even when `externalDatabase.type=pgsql`.
# - `persistence.existingClaim` is the current chart bridge for Moodle file state.
# - Do not treat the claim-backed data path as the final object-storage solution.
